<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coerver Kamp Split 2026 - Instagram Post</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .post {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
    }

    /* Background image */
    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      opacity: 0.6;
    }

    /* Gradient overlay */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(
        180deg,
        rgba(15, 15, 35, 0.5) 0%,
        rgba(15, 15, 35, 0.3) 40%,
        rgba(15, 15, 35, 0.6) 100%
      );
    }

    .content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 45px 50px;
    }

    /* Header with logos */
    .header {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logos-left {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .coerver-logo {
      height: 50px;
      width: auto;
    }

    .adidas-logo {
      height: 50px;
      width: auto;
    }


    /* Top label */
    .top-label {
      color: white;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-align: center;
      margin-top: 25px;
    }

    /* Main title section */
    .title-section {
      text-align: center;
      margin-top: 30px;
    }

    .international {
      color: #F5C518;
      font-size: 38px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 15px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .summer-camp {
      color: white;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .location {
      font-size: 72px;
      font-weight: 900;
      font-style: italic;
      line-height: 1;
      margin-bottom: 10px;
    }

    .location .split {
      color: white;
    }

    .location .croatia {
      color: #F5C518;
    }

    .year {
      color: #F5C518;
      font-size: 120px;
      font-weight: 900;
      font-style: italic;
      line-height: 1;
      margin-top: 10px;
    }

    /* Info row */
    .info-row {
      display: flex;
      justify-content: center;
      gap: 50px;
      margin-top: 40px;
    }

    .info-item {
      text-align: center;
    }

    .info-value {
      color: #F5C518;
      font-size: 28px;
      font-weight: 800;
      font-style: italic;
    }

    .info-label {
      color: white;
      font-size: 20px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* Date section */
    .date-section {
      text-align: center;
      margin-top: 35px;
    }

    .date-value {
      color: white;
      font-size: 32px;
      font-weight: 700;
      font-style: italic;
    }

    .date-value span {
      color: #F5C518;
    }

    .training-info {
      color: white;
      font-size: 20px;
      font-weight: 600;
      font-style: italic;
      margin-top: 15px;
      letter-spacing: 2px;
    }

    /* Price section */
    .price-section {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: auto;
      padding-bottom: 20px;
    }

    .price-box {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .price-tag {
      background: #F5C518;
      color: #1a1a2e;
      padding: 12px 20px;
      font-size: 36px;
      font-weight: 900;
      font-style: italic;
      border-radius: 4px;
      position: relative;
    }

    .price-tag::after {
      content: '';
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      border-left: 10px solid #F5C518;
      border-top: 15px solid transparent;
      border-bottom: 15px solid transparent;
    }

    .price-label {
      color: white;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .price-label .highlight {
      color: #F5C518;
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-top: 2px;
    }

    /* Bottom bar */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid rgba(245, 197, 24, 0.3);
    }

    .website {
      color: #F5C518;
      font-size: 24px;
      font-weight: 700;
      font-style: italic;
    }

    .cta {
      color: white;
      font-size: 26px;
      font-weight: 800;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .cta span {
      color: #F5C518;
    }

    /* Decorative elements */
    .corner-accent {
      position: absolute;
      width: 80px;
      height: 80px;
      border: 3px solid rgba(245, 197, 24, 0.4);
    }

    .corner-accent.top-left {
      top: 20px;
      left: 20px;
      border-right: none;
      border-bottom: none;
    }

    .corner-accent.top-right {
      top: 20px;
      right: 20px;
      border-left: none;
      border-bottom: none;
    }

    .corner-accent.bottom-left {
      bottom: 20px;
      left: 20px;
      border-right: none;
      border-top: none;
    }

    .corner-accent.bottom-right {
      bottom: 20px;
      right: 20px;
      border-left: none;
      border-top: none;
    }
  </style>
</head>
<body>
  <div class="post">
    <!-- Background Image -->
    <img src="images/kamp-split-bg.jpg" alt="Split Croatia" class="bg-image">
    <div class="overlay"></div>

    <!-- Corner accents -->
    <div class="corner-accent top-left"></div>
    <div class="corner-accent top-right"></div>
    <div class="corner-accent bottom-left"></div>
    <div class="corner-accent bottom-right"></div>

    <div class="content">
      <!-- Header with logos -->
      <div class="header">
        <div class="logos-left">
          <img src="images/coerver-logo.png" alt="Coerver Coaching" class="coerver-logo">
          <img src="images/adidas-logo.png" alt="Adidas" class="adidas-logo">
        </div>
      </div>

      <!-- Top label -->
      <div class="top-label">Ljetni Nogometni Kamp</div>

      <!-- Main title -->
      <div class="title-section">
        <div class="international">Internacionalni Kamp</div>
        <div class="location">
          <span class="split">SPLIT,</span> <span class="croatia">HRVATSKA</span>
        </div>
        <div class="year">2026</div>
      </div>

      <!-- Info row -->
      <div class="info-row">
        <div class="info-item">
          <div class="info-value">6 DANA</div>
          <div class="info-label">5 Noći</div>
        </div>
        <div class="info-item">
          <div class="info-value">8-15</div>
          <div class="info-label">Godina</div>
        </div>
      </div>

      <!-- Date -->
      <div class="date-section">
        <div class="date-value"><span>27. SRPNJA</span> - <span>1. KOLOVOZA</span></div>
        <div class="training-info">10 Treninga + 1 Utakmica</div>
      </div>

      <!-- Prices -->
      <div class="price-section">
        <div class="price-box">
          <div class="price-tag">280€</div>
          <div class="price-label">
            Samo Treninzi
            <span class="highlight">bez smještaja</span>
          </div>
        </div>
        <div class="price-box">
          <div class="price-tag">750€</div>
          <div class="price-label">
            Puni Paket
            <span class="highlight">SMJEŠTAJ SA HRANOM</span>
          </div>
        </div>
      </div>

      <!-- Bottom bar -->
      <div class="bottom-bar">
        <div class="website">www.coervercroatia.com</div>
        <div class="cta"><span>Prijavi Se</span> - Ograničen Broj Mjesta!</div>
      </div>
    </div>
  </div>
</body>
</html>
