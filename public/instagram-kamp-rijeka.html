<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coerver Kamp Rijeka 2026 - Instagram Post</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .post {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, #1a1a1a 0%, #0d0d0d 100%);
    }

    /* Background image */
    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 40%;
      opacity: 0.45;
    }

    /* Gradient overlay */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(
        180deg,
        rgba(10, 10, 15, 0.6) 0%,
        rgba(10, 10, 15, 0.4) 40%,
        rgba(10, 10, 15, 0.5) 70%,
        rgba(10, 10, 15, 0.9) 100%
      );
    }

    .content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 50px 60px;
    }

    /* Header with logos */
    .header {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logos {
      display: flex;
      align-items: center;
      gap: 35px;
    }

    .coerver-logo {
      height: 55px;
      width: auto;
    }

    .adidas-logo {
      height: 55px;
      width: auto;
    }

    /* Top label */
    .top-label {
      color: white;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 8px;
      text-transform: uppercase;
      text-align: center;
      margin-top: 40px;
    }

    /* Main title section */
    .title-section {
      text-align: center;
      margin-top: 40px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .camp-type {
      color: #F5C518;
      font-size: 38px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .location {
      font-size: 100px;
      font-weight: 900;
      font-style: italic;
      line-height: 1;
      margin-bottom: 10px;
    }

    .location .city {
      color: white;
    }

    .location .country {
      color: #F5C518;
    }

    .year {
      color: #F5C518;
      font-size: 140px;
      font-weight: 900;
      font-style: italic;
      line-height: 1;
      margin-top: 10px;
    }

    /* Info row */
    .info-row {
      display: flex;
      justify-content: center;
      gap: 60px;
      margin-top: 50px;
    }

    .info-item {
      text-align: center;
    }

    .info-value {
      color: #F5C518;
      font-size: 32px;
      font-weight: 800;
      font-style: italic;
    }

    .info-label {
      color: white;
      font-size: 20px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 5px;
    }

    /* Price badge */
    .price-badge {
      position: absolute;
      top: 200px;
      right: 60px;
      background: #F5C518;
      color: #1a1a1a;
      padding: 15px 25px;
      font-size: 36px;
      font-weight: 900;
      font-style: italic;
      border-radius: 4px;
      z-index: 3;
      box-shadow: 0 4px 20px rgba(245, 197, 24, 0.5);
    }

    /* Bottom bar */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 25px;
      border-top: 2px solid rgba(245, 197, 24, 0.4);
    }

    .website {
      color: #F5C518;
      font-size: 24px;
      font-weight: 700;
      font-style: italic;
    }

    .cta {
      color: white;
      font-size: 28px;
      font-weight: 800;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .cta span {
      color: #F5C518;
    }

    /* Corner accents */
    .corner-accent {
      position: absolute;
      width: 70px;
      height: 70px;
      border: 3px solid rgba(245, 197, 24, 0.5);
      z-index: 2;
    }

    .corner-accent.top-left {
      top: 20px;
      left: 20px;
      border-right: none;
      border-bottom: none;
    }

    .corner-accent.top-right {
      top: 20px;
      right: 20px;
      border-left: none;
      border-bottom: none;
    }

    .corner-accent.bottom-left {
      bottom: 20px;
      left: 20px;
      border-right: none;
      border-top: none;
    }

    .corner-accent.bottom-right {
      bottom: 20px;
      right: 20px;
      border-left: none;
      border-top: none;
    }
  </style>
</head>
<body>
  <div class="post">
    <!-- Background Image -->
    <img src="images/photoshoot/Miami-141.webp" alt="Football Training" class="bg-image">
    <div class="overlay"></div>

    <!-- Corner accents -->
    <div class="corner-accent top-left"></div>
    <div class="corner-accent top-right"></div>
    <div class="corner-accent bottom-left"></div>
    <div class="corner-accent bottom-right"></div>

    <!-- Price badge -->
    <div class="price-badge">280€</div>

    <div class="content">
      <!-- Header with logos -->
      <div class="header">
        <div class="logos">
          <img src="images/coerver-logo.png" alt="Coerver Coaching" class="coerver-logo">
          <img src="images/adidas-logo.png" alt="Adidas" class="adidas-logo">
        </div>
      </div>

      <!-- Top label -->
      <div class="top-label">Ljetni Nogometni Kamp</div>

      <!-- Main title -->
      <div class="title-section">
        <div class="camp-type">Coerver® Kamp</div>
        <div class="location">
          <span class="city">RIJEKA,</span> <span class="country">Omladinsko Igralište</span>
        </div>
        <div class="year">2026</div>
      </div>

      <!-- Info row -->
      <div class="info-row">
        <div class="info-item">
          <div class="info-value">29.06. - 03.07.</div>
          <div class="info-label">Datum</div>
        </div>
        <div class="info-item">
          <div class="info-value">7-16 Godina</div>
          <div class="info-label">Dob</div>
        </div>
        <div class="info-item">
          <div class="info-value">10 Treninga</div>
          <div class="info-label">Program</div>
        </div>
      </div>

      <!-- Bottom bar -->
      <div class="bottom-bar">
        <div class="website">www.coervercroatia.com</div>
        <div class="cta"><span>Prijave Otvorene!</span> - Link u Bio</div>
      </div>
    </div>
  </div>
</body>
</html>
